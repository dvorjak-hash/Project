{% extends "base.html" %}

{% block content %}

<style>
.settings-container {
    max-width: 800px;
    margin: 30px auto;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    overflow: hidden;
}

.settings-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 30px;
    text-align: center;
}

.settings-header h1 {
    margin: 0;
    font-size: 2em;
    font-weight: 300;
}

.settings-body {
    padding: 40px;
}

.form-group {
    margin-bottom: 25px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
    font-size: 1em;
}

.form-group select,
.form-group input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 1em;
    transition: border-color 0.2s;
    box-sizing: border-box;
}

.form-group select:focus,
.form-group input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.action-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 40px;
    padding-top: 30px;
    border-top: 1px solid #e2e8f0;
}

.btn {
    padding: 14px 30px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    font-weight: 500;
    transition: all 0.2s;
    font-size: 1em;
    min-width: 140px;
    text-align: center;
}

.btn-primary {
    background: #667eea;
    color: white;
}

.btn-primary:hover {
    background: #5a67d8;
    transform: translateY(-1px);
    box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
}

.btn-secondary {
    background: #a0aec0;
    color: white;
}

.btn-secondary:hover {
    background: #718096;
    transform: translateY(-1px);
    box-shadow: 0 4px 8px rgba(160, 174, 192, 0.3);
}
</style>

<div class="settings-container">
    <div class="settings-header">
        <h1>⚙️ Uživatelská nastavení</h1>
    </div>

    <div class="settings-body">
        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_default_priority">Výchozí priorita úkolů</label>
                {{ form.default_priority }}
            </div>

            <div class="form-group">
                <label for="id_default_recurrence">Výchozí opakování</label>
                {{ form.default_recurrence }}
            </div>

            <div class="form-group">
                <label for="id_show_completed_tasks">Zobrazovat dokončené úkoly</label>
                {{ form.show_completed_tasks }}
            </div>

            <div class="action-buttons">
                <button type="submit" class="btn btn-primary">💾 Uložit nastavení</button>
                <a href="{% url 'tasks:dashboard' %}" class="btn btn-secondary">⬅️ Zpět</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
