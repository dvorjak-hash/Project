{% extends "base.html" %}

{% block content %}

<h1>Kalendář projektů</h1>

<style>
.calendar-header {
    max-width: 1200px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: flex-end;
}

.btn {
    background: #007bff;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
}

.btn:hover {
    background: #0056b3;
}
</style>

<div class="calendar-header">
    <a href="{% url 'tasks:create_project' %}" class="btn">➕ Nový projekt</a>
</div>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
#calendar {
    max-width: 1200px;
    margin: 20px auto;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    border-radius: 8px;
    overflow: hidden;
}

.fc-header-toolbar {
    background: #f8f9fa;
    padding: 15px;
    border-bottom: 1px solid #dee2e6;
}

.fc-button {
    background: #007bff !important;
    border: none !important;
    border-radius: 6px !important;
    color: white !important;
    font-weight: 500 !important;
    transition: background 0.2s !important;
}

.fc-button:hover {
    background: #0056b3 !important;
}

.fc-button-active {
    background: #0056b3 !important;
}

.fc-daygrid-day:hover {
    background: #f8f9fa;
}

.fc-event.urgency-low {
    background-color: #28a745 !important;
    border-color: #28a745 !important;
    color: white !important;
}

.fc-event.urgency-medium {
    background-color: #fd7e14 !important;
    border-color: #fd7e14 !important;
    color: white !important;
}

.fc-event.urgency-high {
    background-color: #dc3545 !important;
    border-color: #dc3545 !important;
    color: white !important;
}

.fc-tooltip {
    max-width: 300px;
    word-wrap: break-word;
}

.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal.hidden {
    display: none;
}

.modal-content {
    background: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    text-align: center;
}

.modal-content h3 {
    margin-top: 0;
    color: #333;
}

.modal-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}

.modal-buttons button,
.modal-buttons a {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1em;
    text-decoration: none;
    display: inline-block;
}

.btn-primary {
    background: #28a745;
    color: white;
}

.btn-primary:hover {
    background: #218838;
}

.btn-secondary {
    background: #6c757d;
    color: white;
}

.btn-secondary:hover {
    background: #5a6268;
}

.fc-event {
    cursor: pointer;
    background-color: #007bff !important;
    border-color: #0056b3 !important;
}

.fc-event:hover {
    background-color: #0056b3 !important;
    opacity: 0.8;
}
</style>

<div id="calendar"></div>

<!-- MODAL -->
<div id="createModal" class="modal hidden">
    <div class="modal-content">
        <h3>Vytvořit nový projekt?</h3>
        <p id="selectedDateText"></p>

        <div class="modal-buttons">
            <a href="#" id="createProjectLink" class="btn btn-primary">Vytvořit projekt</a>
            <button id="cancelBtn" class="btn btn-secondary">Zrušit</button>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    let selectedDate = null;

    const calendarEl = document.getElementById("calendar");
    const modal = document.getElementById("createModal");
    const createProjectLink = document.getElementById("createProjectLink");
    const cancelBtn = document.getElementById("cancelBtn");
    const selectedDateText = document.getElementById("selectedDateText");

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "dayGridMonth",
        selectable: true,
        locale: "cs",

        headerToolbar: {
            left: "prev,next today",
            center: "title",
            right: "dayGridMonth,timeGridWeek,timeGridDay"
        },

        events: "{% url 'tasks:calendar_events' %}",

        dateClick: function(info) {
            selectedDate = info.dateStr;
            selectedDateText.textContent = `Datum: ${info.dateStr}`;
            createProjectLink.href = `/tasks/projects/create/?start_date=${selectedDate}`;
            modal.classList.remove("hidden");
        },
        
        eventClick: function(info) {
            // Klik na projekt - jdi na zobrazení projektu
            window.location.href = info.event.url;
        }
    });

    calendar.render();

    cancelBtn.addEventListener("click", function() {
        modal.classList.add("hidden");
        selectedDate = null;
    });

    // Zavřít modal při kliknutí mimo
    modal.addEventListener("click", function(e) {
        if (e.target === modal) {
            modal.classList.add("hidden");
        }
    });

});
</script>

{% endblock %}
