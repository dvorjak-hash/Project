<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Planner - Osobní plánovač{% endblock %}</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'tasks/style.css' %}">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f7fafc;
            color: #333;
            line-height: 1.6;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            padding: 30px 20px;
            border-right: none;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .sidebar .logo {
            color: white;
            font-size: 1.8em;
            font-weight: 300;
            margin-bottom: 10px;
            text-align: center;
        }

        .sidebar .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
            text-align: center;
            margin-bottom: 40px;
        }

        .sidebar nav {
            margin-top: 20px;
        }

        .sidebar a {
            display: block;
            margin: 8px 0;
            padding: 12px 20px;
            text-decoration: none;
            color: white;
            border-radius: 8px;
            transition: all 0.2s;
            font-weight: 500;
            position: relative;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .sidebar a.active {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .content {
            margin-left: 260px;
            padding: 30px;
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-title {
            color: #2d3748;
            font-size: 2.5em;
            font-weight: 300;
            margin: 0 0 10px 0;
        }

        .page-subtitle {
            color: #718096;
            font-size: 1.1em;
            margin: 0;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                box-shadow: none;
            }

            .content {
                margin-left: 0;
                padding: 20px;
            }

            .sidebar nav {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }

            .sidebar a {
                flex: 1;
                min-width: 120px;
                text-align: center;
                margin: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Planning Board</div>
        <div class="subtitle">Osobní plánovač</div>

        <nav>
            <a href="{% url 'tasks:dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{% url 'tasks:calendar_view' %}" class="{% if request.resolver_match.url_name == 'calendar_view' %}active{% endif %}">Kalendář</a>
            <a href="{% url 'tasks:project_list' %}" class="{% if request.resolver_match.url_name == 'project_list' %}active{% endif %}">Projekty</a>
            <a href="{% url 'tasks:task_list' %}" class="{% if request.resolver_match.url_name == 'task_list' %}active{% endif %}">Úkoly</a>
            <a href="{% url 'tasks:todo_list' %}" class="{% if request.resolver_match.url_name == 'todo_list' %}active{% endif %}">To do</a>
            <a href="{% url 'tasks:user_settings' %}" class="{% if request.resolver_match.url_name == 'user_settings' %}active{% endif %}">Nastavení</a>
            <a href="{% url 'admin:index' %}">Admin</a>
        </nav>
    </div>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
</div>

</body>
</html>
